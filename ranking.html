<link rel="stylesheet" href="styles.css">
</head><body><div class="dashboard">
  <aside class="sidebar"><div class="brand"><div class="logo">AFK</div><span>RRHH</span></div>
    <nav class="nav">
        <div class="nav-category">Admisión y selección</div>
        <a href="index.html"><span class="label">Dashboard</span></a>
        <a href="vacancies.html"><span class="label">Vacantes</span></a>
        <a class="is-active" href="interviews.html"><span class="label">Entrevistas</span></a>

        <a id="openChatbot" href="#chatbot"><span class="label">Chatbot</span></a>
    </nav>
  </aside>
  <header class="topbar"><button class="btn-menu" aria-label="Abrir menú">☰</button><div class="btn" onclick="location.href='documents.html'">Subir documentos</div><div class="btn" id="btnChat">Abrir Chatbot</div></header>
  <main class="main">
    <h1 class="h1">Entrevistas</h1>
    <div class="card"><div class="card__body">
      <div class="text-muted">Semana (mock)</div>
      <div class="list mt-12">
        <div class="list__row" style="grid-template-columns:36px 1fr auto">
          <img class="avatar" src="https://i.pravatar.cc/48?img=31"><div><strong>Andrea Rios</strong><div class="muted">20/04/2025</div></div><div class="tag">09:00–10:00</div>
        </div>
        <div class="list__row" style="grid-template-columns:36px 1fr auto">
          <img class="avatar" src="https://i.pravatar.cc/48?img=18"><div><strong>Carlos Miranda</strong><div class="muted">20/04/2025</div></div><div class="tag">11:00–12:00</div>
        </div>
      </div>
    </div></div>
  </main>
  <aside id="chatbot" class="chatbot"><div class="chatbot__head"><strong>AFK Chatbot</strong><button id="closeChat" class="btn">Cerrar</button></div><div id="chatBody" class="chatbot__body"><div class="chat-msg bot">Hola 👋</div></div><div class="chatbot__input"><input id="chatInput"><button id="chatSend" class="btn btn--primary">Enviar</button></div></aside>
</div>
<script>
const d=document,dr=d.getElementById('chatbot'),i=d.getElementById('chatInput'),b=d.getElementById('chatBody');
d.getElementById('btnChat').onclick=()=>{dr.classList.add('is-open');i.focus()};
d.getElementById('openChatbot').onclick=e=>{e.preventDefault();dr.classList.add('is-open');i.focus()};
d.getElementById('closeChat').onclick=()=>dr.classList.remove('is-open');
d.getElementById('chatSend').onclick=()=>{const v=i.value.trim();if(!v)return;const m=d.createElement('div');m.className='chat-msg user';m.textContent=v;b.appendChild(m);i.value='';};
i.onkeydown=e=>{if(e.key==='Enter')d.getElementById('chatSend').click()};
</script>
<script defer src="responsive.js?v=2.0"></script>
</body></html>
