<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AFK RRHH — Trabajadores</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="dashboard">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">AFK</div>
      <span>RRHH</span>
    </div>

    <nav class="nav">
      <div class="nav-category">Admisión y selección</div>
      <a href="index.html"><span class="label">Dashboard</span></a>
      <a href="vacancies.html"><span class="label">Vacantes</span></a>
      <a href="interviews.html"><span class="label">Entrevistas</span></a>
      <a href="pipeline.html"><span class="label">Pipeline</span></a>

      <div class="nav-category">Gestión</div>
      <a class="is-active" href="workers.html"><span class="label">Trabajadores</span></a>
      <a href="alerts.html"><span class="label">Alertas</span></a>
      <a href="documents.html"><span class="label">Documentos</span></a>
      <a href="reports.html"><span class="label">Reportes</span></a>
      <a id="openChatbot" href="#chatbot"><span class="label">Chatbot</span></a>
    </nav>
  </aside>

  <header class="topbar">
    <button class="btn-menu" aria-label="Abrir menú">☰</button>
    <div class="h1" style="font-size:20px; margin-right:auto;">Directorio de Trabajadores</div>
    <button class="btn" id="btnChat">Abrir Chatbot</button>
  </header>

  <main class="main">
    <div class="toolbar">
      <div class="toolbar__left" style="display:flex; gap:10px; flex-wrap:wrap;">
        <div class="input">
          <input id="workerSearch" placeholder="Buscar por nombre, RUT o empresa...">
        </div>

        <select id="filterStatus" class="select">
          <option value="">Todos los estados</option>
          <option value="Activo">Activo</option>
          <option value="Inactivo">Inactivo</option>
        </select>

        <button id="btnResetFilters" class="btn">Reset</button>
      </div>

      <div class="toolbar__right" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; background:rgba(255,107,107,0.05); padding:8px 12px; border-radius:12px; border:1px dashed var(--accent);">
        <div class="input" style="max-width:260px;">
          <input id="projectName" placeholder="Nombre del Proyecto">
        </div>

        <button id="btnGenerateTec02" class="btn btn--primary" style="white-space:nowrap;">
          Generar planilla exámenes
        </button>
      </div>
    </div>

    <div class="card">
      <div id="workersTable" class="table workers">
        <div class="loading-state" style="padding:40px; text-align:center; color:var(--muted)">
          Cargando listado de trabajadores...
        </div>
      </div>
    </div>
  </main>

  <aside id="chatbot" class="chatbot">
    <div class="chatbot__head">
      <strong>AFK Chatbot</strong>
      <button id="closeChat" class="btn">Cerrar</button>
    </div>

    <div id="chatBody" class="chatbot__body"></div>

    <div class="chatbot__input">
      <input id="chatInput" placeholder="Escribe aquí…" />
      <button id="chatSend" class="btn btn--primary">Enviar</button>
    </div>
  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js?v=5.0"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

<script defer src="workers.supabase.js?v=5.0"></script>
<script defer src="chat.js?v=2.0"></script>
<script defer src="responsive.js?v=2.0"></script>
</body>
</html>
