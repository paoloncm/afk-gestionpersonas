<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AFK RRHH — Trabajadores</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="dashboard">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">AFK</div>
      <span>RRHH</span>
    </div>

    <nav class="nav">
      <div class="nav-category">Admisión y selección</div>
      <a href="index.html">Dashboard</a>
      <a href="vacancies.html">Vacantes</a>
      <a href="interviews.html">Entrevistas</a>
      <a href="pipeline.html">Pipeline</a>

      <div class="nav-category">Gestión</div>
      <a class="is-active" href="workers.html">Trabajadores</a>
      <a href="alerts.html">Alertas</a>
      <a href="documents.html">Documentos</a>
      <a href="reports.html">Reportes</a>
      <a id="openChatbot" href="#chatbot">Chatbot</a>
    </nav>
  </aside>

  <!-- Topbar -->
  <header class="topbar">
    <button class="btn-menu">☰</button>
    <div class="h1" style="font-size:20px">Directorio de Trabajadores</div>
    <button class="btn" id="btnChat">Abrir Chatbot</button>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Toolbar -->
    <div class="toolbar">

      <!-- Filtros -->
      <div class="toolbar__left" style="display:flex; gap:10px; flex-wrap:wrap;">
        <div class="input">
          <input id="workerSearch" placeholder="Buscar por nombre, RUT o empresa...">
        </div>

        <select id="filterStatus" class="select">
          <option value="">Todos los estados</option>
          <option value="Activo">Activo</option>
          <option value="Inactivo">Inactivo</option>
        </select>

        <button id="btnResetFilters" class="btn">Reset</button>
      </div>

      <!-- TEC-02 -->
      <div class="toolbar__right" style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; background:rgba(255,107,107,0.05); padding:10px 14px; border-radius:12px; border:1px dashed var(--accent);">

        <div class="input" style="max-width:220px;">
          <input id="projectName" placeholder="Nombre del Proyecto">
        </div>

        <div class="input" style="max-width:260px;">
          <input id="companyLegalName" placeholder="Razón Social">
        </div>

        <div class="input" style="max-width:240px;">
          <input id="legalRepresentative" placeholder="Representante Legal">
        </div>

        <button id="btnGenerateTec02" class="btn btn--primary">
          Generar TEC-02
        </button>
      </div>

    </div>

    <!-- Tabla -->
    <div class="card">
      <div id="workersTable" class="table workers">
        <div class="loading-state" style="padding:40px; text-align:center; color:var(--muted)">
          Cargando trabajadores...
        </div>
      </div>
    </div>

  </main>

  <!-- Chatbot -->
  <aside id="chatbot" class="chatbot">
    <div class="chatbot__head">
      <strong>AFK Chatbot</strong>
      <button id="closeChat" class="btn">Cerrar</button>
    </div>

    <div id="chatBody" class="chatbot__body"></div>

    <div class="chatbot__input">
      <input id="chatInput" placeholder="Escribe aquí…" />
      <button id="chatSend" class="btn btn--primary">Enviar</button>
    </div>
  </aside>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js?v=3.0"></script>

<!-- ✅ ESTA ES LA CLAVE -->
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>

<script defer src="workers.supabase.js?v=4.1"></script>
<script defer src="chat.js?v=2.0"></script>
<script defer src="responsive.js?v=2.0"></script>

</body>
</html>
