<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AFK RRHH — Pipeline Kanban</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .kanban {
      display: flex;
      gap: 20px;
      padding: 20px 0;
      overflow-x: auto;
      min-height: calc(100vh - 180px);
      align-items: stretch;
    }
    .kanban__col {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      max-height: 100%;
    }
    .kanban__head {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .kanban__count {
      background: rgba(255,255,255,0.1);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
    }
    .kanban__body {
      padding: 12px;
      flex: 1;
      overflow-y: auto;
      min-height: 200px;
      transition: background 0.2s;
    }
    .kanban__body.drag-over {
      background: rgba(255,255,255,0.08);
    }
    .kanban__card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
      cursor: grab;
      transition: all 0.2s ease;
      position: relative;
    }
    .kanban__card:hover {
      background: var(--card-2);
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.4);
      border-color: rgba(255,255,255,0.15);
    }
    .kanban__card:active { cursor: grabbing; }
    .kanban__card .name { font-weight: 700; font-size: 14px; display: block; color: #fff; margin-bottom: 4px; }
    .kanban__card .prof { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .kanban__card .meta { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; display: flex; justify-content: space-between; }
    
    .text-white { color: #fff; }
    .text-muted { color: var(--muted); }
    
    .is-dragging {
      opacity: 0.3;
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <aside class="sidebar">
      <div class="brand"><div class="logo">AFK</div><span>RRHH</span></div>
      <nav class="nav">
        <div class="nav-category">Admisión y selección</div>
        <a href="index.html"><span class="label">Dashboard</span></a>
        <a href="vacancies.html"><span class="label">Vacantes</span></a>
        <a href="interviews.html"><span class="label">Entrevistas</span></a>
        <a class="is-active" href="pipeline.html"><span class="label">Pipeline</span></a>

        <div class="nav-category">Gestión</div>
        <a href="workers.html"><span class="label">Trabajadores</span></a>
        <a href="alerts.html"><span class="label">Alertas</span></a>
        <a href="documents.html"><span class="label">Documentos</span></a>
        <a href="reports.html"><span class="label">Reportes</span></a>
        <a id="openChatbot" href="#chatbot"><span class="label">Chatbot</span></a>
      </nav>
    </aside>

    <header class="topbar">
        <button class="btn-menu" aria-label="Abrir menú">☰</button>
        <div class="h1" style="font-size:20px">Pipeline de Reclutamiento</div>
        <div class="btn" id="btnChat">Abrir Copiloto</div>
    </header>

    <main class="main">
      <section class="toolbar">
        <div class="toolbar__left">
          <select id="kanbanVacancyFilter" class="select" style="min-width: 250px;">
            <option value="">Cargando vacantes...</option>
          </select>
        </div>
      </section>

      <div class="kanban" id="kanbanBoard">
        <!-- Generado dinámicamente -->
      </div>
    </main>

    <aside id="chatbot" class="chatbot">
      <div class="chatbot__head"><strong>AFK Copiloto</strong><button id="closeChat" class="btn">Cerrar</button></div>
      <div id="chatBody" class="chatbot__body"></div>
      <div class="chatbot__input"><input id="chatInput"><button id="chatSend" class="btn btn--primary">Enviar</button></div>
    </aside>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=2.0"></script>
  <script defer src="pipeline.js?v=2.0"></script>
  <script>
    // Toggle Chatbot
    const d=document, chat=d.getElementById('chatbot');
    d.getElementById('btnChat').onclick = () => chat.classList.add('is-open');
    d.getElementById('closeChat').onclick = () => chat.classList.remove('is-open');
  </script>
  <script defer src="responsive.js?v=2.0"></script>
</body>
</html>
