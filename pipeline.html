<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFK RRHH — Pipeline Estratégico (Nivel Stark)</title>
  <link rel="stylesheet" href="static/styles.css">
  <style>
    .kanban {
      display: flex;
      gap: 20px;
      padding: 20px 0;
      overflow-x: auto;
      min-height: calc(100vh - 200px);
      align-items: stretch;
    }
    .kanban__col {
      background: rgba(7, 18, 37, 0.4);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      min-width: 320px;
      display: flex;
      flex-direction: column;
      max-height: 100%;
      backdrop-filter: blur(10px);
    }
    .kanban__head {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
    }
    .kanban__count {
      background: rgba(65, 223, 255, 0.1);
      color: var(--cyan);
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      border: 1px solid rgba(65, 223, 255, 0.2);
    }
    .kanban__body {
      padding: 12px;
      flex: 1;
      overflow-y: auto;
      min-height: 300px;
    }
    .kanban__card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: grab;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .kanban__card:hover {
      border-color: var(--cyan);
      background: rgba(65, 223, 255, 0.08);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .kanban__card .name { font-weight: 800; font-size: 14px; color: #fff; margin-bottom: 4px; display: block; }
    .kanban__card .prof { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar Stark v2.0 -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">AFK</div>
        <div>
          <h1>AFK RRHH</h1>
          <span>Inteligencia Operativa</span>
        </div>
      </div>
      <div class="nav-title">Principal</div>
      <nav class="nav">
        <a href="index.html">Dashboard</a>
        <a href="tenders.html">Vacantes</a>
        <a href="interviews.html">Entrevistas</a>
        <a class="active" href="pipeline.html">Pipeline</a>
      </nav>
      <div class="nav-title">Gestión</div>
      <nav class="nav">
        <a href="workers.html">Trabajadores</a>
        <a href="alerts.html">Alertas</a>
        <a href="documents.html">Documentos</a>
        <a href="reports.html">Reportes</a>
        <a href="#" id="openChatbot">Chatbot</a>
      </nav>
      <div class="nav-title">Analítica e IA</div>
      <nav class="nav">
        <a href="analytics.html">People Analytics</a>
        <a href="analytics.html">Cumplimiento</a>
        <a href="tenders.html">Licitaciones</a>
      </nav>
    </aside>

    <main class="main">
      <div class="top-actions">
        <div class="h1" style="font-size:20px; font-weight:800; letter-spacing:1px; flex:1;">Pipeline Estratégico JARVIS</div>
        <button class="btn primary" id="btnSync">Sincronizar Flujo</button>
      </div>

      <header class="card">
        <div class="scan-line"></div>
        <div class="ai-row">
           <div class="search" style="min-width: 100%;">
             <select id="kanbanVacancyFilter" class="btn" style="background: transparent; border:none; width:100%; text-align:left;">
                <option value="">Cargando vacantes activas...</option>
             </select>
           </div>
        </div>
      </header>

      <div class="kanban" id="kanbanBoard">
         <!-- Se puebla dinámicamente -->
         <div style="padding:50px; text-align:center; width:100%;">
            <span class="text-cyan">Inicializando Matriz de Reclutamiento...</span>
         </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="static/supabase.js"></script>
  <script src="static/auth.js"></script>
  <script defer src="static/pipeline.js"></script>
</body>
</html>
