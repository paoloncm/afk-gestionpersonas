<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Seguro — AFK RRHH (Nivel Stark)</title>
  <link rel="stylesheet" href="static/styles.css">
  <style>
    body {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }
    .login-container {
      max-width: 420px; width: 100%; padding: 20px;
      animation: emerge 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes emerge {
      from { opacity: 0; transform: scale(0.9) translateY(30px); filter: blur(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }
    .login-card {
      background: rgba(7, 18, 37, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid var(--cyan);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 0 60px rgba(65, 223, 255, 0.15), inset 0 0 20px rgba(65, 223, 255, 0.05);
      position: relative;
    }
    .login-card::before {
      content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
      border-radius: inherit; background: linear-gradient(45deg, var(--cyan), transparent, var(--pink), transparent);
      z-index: -1; opacity: 0.3;
    }
    .login-title {
      font-size: 24px; font-weight: 900; letter-spacing: 2px;
      text-align: center; margin-bottom: 30px; text-transform: uppercase;
    }
    input {
      width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
      padding: 14px; border-radius: 12px; color: white; margin-bottom: 20px;
      transition: all 0.3s; font-size: 14px;
    }
    input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 15px rgba(65, 223, 255, 0.2); }
    .error-box {
      background: rgba(255, 15, 106, 0.1); border: 1px solid var(--pink);
      color: var(--pink-2); padding: 12px; border-radius: 8px; font-size: 12px;
      margin-bottom: 20px; display: none; text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="scan-line"></div>
      
      <div class="brand" style="justify-content:center; border:none; margin-bottom:10px;">
        <div class="brand-logo">AFK</div>
        <h1 style="font-size:18px; letter-spacing:3px;">STARK_GATEWAY</h1>
      </div>
      
      <div class="login-title text-cyan">Identificación Requerida</div>

      <div id="errorBox" class="error-box"></div>

      <form id="loginForm">
        <div style="margin-bottom:5px; font-size:10px; color:var(--muted); font-weight:800;">USER_ID (EMAIL)</div>
        <input type="email" id="email" placeholder="nombre@empresa.com" required>
        
        <div style="margin-bottom:5px; font-size:10px; color:var(--muted); font-weight:800;">ACCESS_KEY (PASSWORD)</div>
        <input type="password" id="password" placeholder="••••••••" required>

        <button type="submit" class="btn primary" id="btnLogin" style="width:100%; justify-content:center; padding:16px; font-weight:900; letter-spacing:1px;">AUTENTICAR EN LA RED</button>
      </form>

      <div style="margin-top:25px; text-align:center; font-size:11px; color:var(--muted);">
        ¿Acceso denegado? <a href="#" class="text-cyan" style="text-decoration:none; font-weight:800;">SOPORTE_STARK</a>
      </div>
    </div>
  </div>

  <script src="/static/supabase-js.2.js"></script>
  <script src="/static/supabase.js"></script>
  <script src="/static/auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    const errorBox = document.getElementById('errorBox');
    const btn = document.getElementById('btnLogin');

    form.onsubmit = async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'VERIFICANDO CREDENCIALES...';
      errorBox.style.display = 'none';

      try {
        const { error } = await window.supabase.auth.signInWithPassword({
          email: emailInput.value,
          password: passInput.value
        });

        if (error) throw error;

        // Éxito: Redirigir al dashboard
        window.location.href = 'index.html';
      } catch (err) {
        errorBox.textContent = 'ERROR: ' + (err.message === 'Invalid login credentials' ? 'CREDENCIALES INVÁLIDAS' : err.message.toUpperCase());
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'REINTENTAR ACCESO';
      }
    };
  </script>
</body>
</html>
