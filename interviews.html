<!doctype html><html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>AFK RRHH — Entrevistas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
  <style>
    .interview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 10px;
    }
    .interview-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }
    .interview-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        border-color: rgba(255,255,255,0.15);
    }
    .interview-card__header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }
    .interview-card__avatar {
        width: 50px;
        height: 50px;
        border-radius: 12px;
        object-fit: cover;
        background: #222;
    }
    .interview-card__status {
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 8px;
        text-transform: uppercase;
    }
    .badge-programada { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
    .badge-realizada { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
    .badge-cancelada { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
    .badge-pendiente-de-feedback { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }

    .interview-card__name {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
    }
    .interview-card__vacancy {
        font-size: 13px;
        color: var(--muted);
        margin-top: -4px;
    }
    .interview-card__time {
        font-size: 14px;
        color: #fff;
        background: rgba(255,255,255,0.05);
        padding: 8px 12px;
        border-radius: 10px;
        margin-top: 4px;
        display: flex;
        align-items: center;
    }
    .interview-card__footer {
        display: flex;
        gap: 10px;
        margin-top: auto;
        padding-top: 10px;
        border-top: 1px solid var(--border);
    }
    .interview-card__footer .btn {
        flex: 1;
        justify-content: center;
        font-size: 12px;
        padding: 8px;
    }
  </style>
</head><body><div class="dashboard">
  <aside class="sidebar" aria-label="Navegación">
      <div class="brand">
        <div class="logo">AFK</div>
        <span>RRHH</span>
      </div>

      <nav class="nav">
        <div class="nav-category">Admisión y selección</div>
        <a href="index.html"><span class="label">Dashboard</span></a>
        <a href="vacancies.html"><span class="label">Vacantes</span></a>
        <a class="is-active" href="interviews.html"><span class="label">Entrevistas</span></a>
        <a href="pipeline.html"><span class="label">Pipeline</span></a>

        <div class="nav-category">Gestión</div>
        <a href="workers.html"><span class="label">Trabajadores</span></a>
        <a href="alerts.html"><span class="label">Alertas</span></a>
        <a href="documents.html"><span class="label">Documentos</span></a>
        <a href="reports.html"><span class="label">Reportes</span></a>
        <a id="openChatbot" href="#chatbot"><span class="label">Chatbot</span></a>

        <div class="nav-category">Analítica e Inteligencia</div>
        <a href="analytics.html"><span class="label">People Analytics</span></a>
      </nav>
    </aside>
  <header class="topbar">
      <button class="btn-menu" aria-label="Abrir menú">☰</button>
      <div style="display:flex; gap:10px; margin-left:auto; flex-wrap:wrap;">
        <button id="btnGenerateTec02FromCandidates" class="btn">Generar TEC-02</button>
        <button id="btnGenerateTec02AFromCandidates" class="btn">Generar TEC-02-A</button>
        <button class="btn" onclick="location.href='documents.html'">Subir documentos</button>
        <button class="btn btn--primary" id="btnChat">Abrir Chatbot</button>
      </div>
    </header>
  <main class="main" id="interviews-container">
    <h1 class="h1">Cargando entrevistas...</h1>
  </main>

  <div id="updateModal" class="modal">
    <div class="modal__content" style="max-width:400px">
      <div class="modal__header">
        <h2 class="h1" style="font-size:18px">Seguimiento de Entrevista</h2>
        <button class="close-modal">&times;</button>
      </div>
      <div class="modal__body">
        <form id="updateForm">
          <input type="hidden" id="editInterviewId">
          <div class="form-group">
            <label>Estado</label>
            <select id="editStatus" class="select" style="width:100%">
              <option value="Programada">Programada</option>
              <option value="Realizada">Realizada</option>
              <option value="Cancelada">Cancelada</option>
              <option value="Pendiente de feedback">Pendiente de feedback</option>
            </select>
          </div>
          <div class="form-group" style="margin-top:16px">
            <label>Notas / Resultado</label>
            <textarea id="editNotes" class="input" style="width:100%; height:100px; padding:10px;" placeholder="Escribe aquí el resultado de la entrevista..."></textarea>
          </div>
          <button type="submit" class="btn btn--primary" style="width:100%; margin-top:16px">Guardar Seguimiento</button>
        </form>
      </div>
    </div>
  </div>
  <aside id="chatbot" class="chatbot">
    <div class="chatbot__head"><strong>AFK Chatbot</strong><button id="closeChat" class="btn">Cerrar</button></div>
    <div id="chatBody" class="chatbot__body">
      <div class="chat-msg bot">Hola 👋</div>
    </div>
    <div class="chatbot__input"><input id="chatInput"><button id="chatSend" class="btn btn--primary">Enviar</button></div>
  </aside>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/static/supabase.js?v=2.0"></script>
<script defer src="/static/interviews.supabase.js?v=2.0"></script>
<script>
  const d = document,
    dr = d.getElementById('chatbot'),
    i = d.getElementById('chatInput'),
    b = d.getElementById('chatBody');
  d.getElementById('btnChat').onclick = () => {
    dr.classList.add('is-open');
    i.focus()
  };
  d.getElementById('openChatbot').onclick = e => {
    e.preventDefault();
    dr.classList.add('is-open');
    i.focus()
  };
  d.getElementById('closeChat').onclick = () => dr.classList.remove('is-open');
  d.getElementById('chatSend').onclick = () => {
    const v = i.value.trim();
    if (!v) return;
    const m = d.createElement('div');
    m.className = 'chat-msg user';
    m.textContent = v;
    b.appendChild(m);
    i.value = '';
  };
  i.onkeydown = e => {
    if (e.key === 'Enter') d.getElementById('chatSend').click()
  };
</script>
<script defer src="/static/responsive.js?v=2.0"></script>
  <script defer src="/static/chat.js?v=5.0"></script>
</body></html>
