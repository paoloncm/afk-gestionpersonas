<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AFK RRHH â€” Licitaciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="dashboard">
    <aside class="sidebar" aria-label="NavegaciĂ³n">
      <div class="brand">
        <div class="logo">AFK</div>
        <span>RRHH</span>
      </div>
      <nav class="nav">
        <div class="nav-category">GestiĂ³n</div>
        <a href="index.html"><span class="label">Dashboard</span></a>
        <a href="workers.html"><span class="label">Trabajadores</span></a>
        <a class="is-active" href="tenders.html"><span class="label">Licitaciones</span></a>
        <a href="documents.html"><span class="label">Documentos</span></a>
      </nav>
    </aside>

    <header class="topbar">
      <button class="btn-menu">â˜°</button>
      <div class="h1" style="font-size:18px; margin-right:auto; margin-bottom: 0;">GestiĂ³n de Licitaciones</div>
      <button id="btnNewTender" class="btn btn--primary" style="margin-left:auto;">+ Nueva LicitaciĂ³n</button>
    </header>

    <main class="main">
      <div class="toolbar" style="margin-bottom: 16px;">
        <div class="toolbar__left" style="display:flex; gap:10px; width:100%;">
          <div class="input" style="flex: 1; max-width: 500px;">
            <input id="searchTender" type="text" placeholder="Buscar licitaciĂ³n por nombre, descripciĂ³n o requerimiento...">
          </div>
        </div>
      </div>

      <div class="card" style="padding: 0;">
        <div class="table tenders">
          <div class="t-head tenders-head">
            <div class="t-col-name">LicitaciĂ³n / Empresa</div>
            <div class="t-col-desc">DescripciĂ³n</div>
            <div class="t-col-reqs">Requisitos MĂ­nimos</div>
            <div class="t-col-actions" style="text-align:right;">Acciones</div>
          </div>
          <div id="tendersBody" style="display:flex; flex-direction:column;">
            <div style="padding: 40px; text-align: center; color: var(--muted);">Cargando licitaciones...</div>
          </div>
        </div>
      </div>
    </main>

    <!-- Modal Nueva LicitaciĂ³n -->
    <div id="tenderModal" class="modal">
      <div class="modal__content" style="max-width:600px">
        <div class="modal__header">
          <h2 class="h1">Configurar LicitaciĂ³n</h2>
          <button class="close-modal">&times;</button>
        </div>
        <div class="modal__body">
          <form id="tenderForm">
            <input type="hidden" id="tenderId" name="id">
            <div class="form-group">
              <label>Nombre del Proyecto / LicitaciĂ³n</label>
              <input id="tenderName" name="name" class="input" placeholder="Ej: Mantenimiento Planta Norte 2024" required>
            </div>
            <div class="form-group">
              <label>DescripciĂ³n</label>
              <textarea id="tenderDesc" name="description" class="input" style="height:80px" placeholder="Detalles del proyecto..."></textarea>
            </div>
            
            <div class="form-group">
              <label>Requerimientos de Salud / Certificaciones</label>
              <div id="reqContainer" style="display:flex; flex-direction:column; gap:8px; margin-bottom:12px;">
                <!-- Reqs dinĂ¡micos -->
              </div>
              <button type="button" id="btnAddReq" class="btn btn--mini">+ AĂ±adir Requisito</button>
            </div>

            <button type="submit" class="btn btn--primary" style="width:100%; margin-top:20px;">Guardar LicitaciĂ³n</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Modal Matchmaking (Resultados) -->
    <div id="matchModal" class="modal">
      <div class="modal__content" style="max-width:800px">
        <div class="modal__header">
          <h2 id="matchTitle" class="h1">Buscando Trabajadores Aptos...</h2>
          <button class="close-modal">&times;</button>
        </div>
        <div class="modal__body">
          <div id="matchResults" class="table">
            <div class="t-head">
              <div class="t-col-name">Trabajador</div>
              <div class="t-col-prof">Estado</div>
              <div class="t-col-status">Detalle</div>
            </div>
            <div id="matchBody"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="tenders.supabase.js?v=2.0"></script>
    <aside id="chatbot" class="chatbot">
      <div class="chatbot__head">
        <strong>AFK Chatbot</strong>
        <button id="closeChat" class="btn" type="button">Cerrar</button>
      </div>

      <div id="chatBody" class="chatbot__body"></div>

      <div class="chatbot__input">
        <input id="chatInput" type="text" placeholder="Escribe aquí…">
        <button id="chatSend" class="btn btn--primary" type="button">Enviar</button>
      </div>
    </aside>
  <script defer src="chat.js?v=5.0"></script>
</body>
</html>
