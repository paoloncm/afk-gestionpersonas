  <header class="topbar"><button class="btn-menu" aria-label="Abrir menú">☰</button><div class="btn" id="btnChat">Abrir Chatbot</div></header>
  <main class="main">
    <h1 class="h1">Documentos</h1>
    <div class="card"><div class="card__body">
      <div class="uploader">
        <div id="dropzone" class="dropzone" tabindex="0">
          <p class="m-0">Arrastra archivos aquí o <span class="btn btn--primary" id="pickFiles">Selecciona</span> o <span class="btn btn--outline" id="pickFolder">Carpeta</span></p>
          <p class="text-muted m-0">PDF, DOCX, XLSX, PNG (máx. 25MB)</p>
          <input id="fileInput" type="file" multiple hidden>
          <input id="folderInput" type="file" webkitdirectory mozdirectory msdirectory odirectory directory hidden>
        </div>
        
        <div class="folder-selector" style="margin-top: 15px; display: flex; gap: 10px; align-items: center;">
          <label for="categoryInput" style="font-size: 14px; font-weight: 600;">Nombre de Carpeta / Categoría:</label>
          <input id="categoryInput" class="input" type="text" placeholder="Ej: Licitación 2024" style="max-width: 300px;">
        </div>

        <div id="files" class="files"></div>
        <div><button id="uploadNow" class="btn btn--primary">Subir ahora</button></div>
      </div>
    </div></div>
  </main>
  <aside id="chatbot" class="chatbot"><div class="chatbot__head"><strong>AFK Chatbot</strong><button id="closeChat" class="btn">Cerrar</button></div><div id="chatBody" class="chatbot__body"><div class="chat-msg bot">Hola 👋</div></div><div class="chatbot__input"><input id="chatInput"><button id="chatSend" class="btn btn--primary">Enviar</button></div></aside>
</div>
<script>
const d=document,dr=d.getElementById('chatbot'),i=d.getElementById('chatInput'),b=d.getElementById('chatBody');
d.getElementById('btnChat')?.addEventListener('click',()=>{dr.classList.add('is-open');i.focus()});
d.getElementById('openChatbot')?.addEventListener('click',e=>{e.preventDefault();dr.classList.add('is-open');i.focus()});
d.getElementById('closeChat').onclick=()=>dr.classList.remove('is-open');
d.getElementById('chatSend').onclick=()=>{const v=i.value.trim();if(!v)return;const m=d.createElement('div');m.className='chat-msg user';m.textContent=v;b.appendChild(m);i.value='';};
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/static/supabase.js?v=2.0"></script>
<script src="/static/auth.js?v=1.1"></script>
<script src="/static/documents.supabase.js?v=1.0"></script>

  <script defer src="/static/chat.js?v=5.0"></script>
